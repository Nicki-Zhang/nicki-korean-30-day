<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8f7fc">
  <title>Nikigo Learn V4 Prototype</title>
  <link rel="stylesheet" href="prototype.css">
</head>
<body>
  <a class="skip-link" href="#app">跳到主要内容</a>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="?lang=zh&stage=K1" aria-label="Nikigo home" translate="no">Nikigo</a>
        <nav class="desktop-nav" aria-label="主导航">
          <button type="button" data-nav="home">首页</button>
          <button type="button" class="active" data-nav="learn" aria-current="page">学习</button>
          <button type="button" data-nav="practice">练习</button>
          <button type="button" data-nav="progress">进度</button>
          <button type="button" data-nav="profile">我的</button>
        </nav>
        <div class="top-actions">
          <label class="language-label" for="languageSelect">辅助语言</label>
          <select id="languageSelect" aria-label="辅助语言">
            <option value="zh">简体中文</option>
            <option value="en">English</option>
            <option value="vi">Tiếng Việt</option>
            <option value="ja">日本語</option>
          </select>
          <button class="avatar" type="button" aria-label="个人设置">N</button>
        </div>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="mobile-nav" aria-label="主导航">
      <button type="button" data-nav="home">首页</button>
      <button type="button" class="active" data-nav="learn" aria-current="page">学习</button>
      <button type="button" data-nav="practice">练习</button>
      <button type="button" data-nav="progress">进度</button>
      <button type="button" data-nav="profile">我的</button>
    </nav>
    <p id="liveStatus" class="sr-only" role="status" aria-live="polite"></p>
  </div>
  <script src="prototype.js"></script>
</body>
</html>
