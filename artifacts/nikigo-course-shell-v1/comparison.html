<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nikigo Course Shell V1 · Three course types</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#eeebf5;color:#211c2b;font-family:"Noto Sans KR","Apple SD Gothic Neo",system-ui,sans-serif}main{width:min(100% - 48px,1360px);margin:auto;padding:32px 0 48px}h1{margin:0 0 8px;font-size:28px;letter-spacing:-.04em}p{margin:0 0 24px;color:#6d6877}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.sample{overflow:hidden;border-radius:22px;background:#fff;box-shadow:0 16px 44px rgb(47 27 84/.08)}.sample h2{margin:0;padding:14px 18px;border-bottom:1px solid #ded9e9;font-size:15px}.frame{height:760px;overflow:hidden}.frame iframe{width:390px;height:844px;border:0;transform:scale(.955);transform-origin:top left}@media(max-width:1100px){.grid{grid-template-columns:1fr}.frame{height:844px}.frame iframe{width:100%;transform:none}}
  </style>
</head>
<body>
  <main>
    <h1>统一外壳，保留真实课程差异</h1>
    <p>基础教学、场景任务与阶段挑战使用相同上下文和操作层，但主学习区域保持各自结构。</p>
    <div class="grid">
      <section class="sample"><h2>A · Lesson 7 基础教学</h2><div class="frame"><iframe title="Lesson 7 foundation prototype" src="index.html?course=lesson07&amp;state=explain&amp;lang=zh"></iframe></div></section>
      <section class="sample"><h2>B · Lesson 11 场景任务</h2><div class="frame"><iframe title="Lesson 11 scenario prototype" src="index.html?course=lesson11&amp;state=dialogue&amp;lang=zh"></iframe></div></section>
      <section class="sample"><h2>C · Lesson 10 阶段挑战</h2><div class="frame"><iframe title="Lesson 10 checkpoint prototype" src="index.html?course=lesson10&amp;state=choice&amp;lang=zh"></iframe></div></section>
    </div>
  </main>
</body>
</html>
