<body class="classicFocusShell classicFocusNumbers classicFocusSprint">
  <a class="skipLink" id="skipLink" href="#lessonStage"></a>

    <button class="logo" id="homeLogo" type="button" translate="no"><b aria-hidden="true">✦</b> Nikigo</button>
    <span class="lessonName" id="lessonName"></span>
    <div class="topActions">
      <label class="languagePicker">
