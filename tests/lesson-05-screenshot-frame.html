<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lesson 5 exact viewport screenshot</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;overflow:hidden;background:#f8f6ff}
  iframe{display:block;border:0}
</style>
<iframe id="lesson" title="Lesson 5 screenshot frame"></iframe>
<script>
  const params = new URLSearchParams(location.search);
  const width = Math.max(320, Math.min(1440, Number(params.get('width')) || 390));
  const height = Math.max(640, Math.min(1200, Number(params.get('height')) || 844));
  const step = Math.max(0, Math.min(15, Number(params.get('step')) || 0));
  const lang = ['zh', 'en', 'vi', 'ja'].includes(params.get('lang')) ? params.get('lang') : 'zh';
  document.documentElement.style.width = `${width}px`;
  document.documentElement.style.height = `${height}px`;
  document.body.style.width = `${width}px`;
  document.body.style.height = `${height}px`;
  const profile = JSON.parse(localStorage.getItem('nikigoProfile') || '{}');
  profile.interfaceLanguage = lang;
  profile.completedLessons = [...new Set([...(profile.completedLessons || []), 'k0-consonant-contrast'])];
  localStorage.setItem('nikigoProfile', JSON.stringify(profile));
  localStorage.setItem('nikigoLessonSession:lesson-05', JSON.stringify({
    version: 1,
    step,
    practiceAnswers: { left: { choice: 'left', correct: true }, top: { choice: 'top', correct: true } },
    splitAnswers: { splitNa: { choice: 'ㄴ + ㅏ', correct: true }, splitGo: { choice: 'ㄱ + ㅗ', correct: true }, splitEo: { choice: 'ㅇ + ㅓ', correct: true } },
    built: ['가', '고', '어'],
    builderInitial: 'ㄱ',
    builderVowel: 'ㅏ',
    challengeStarted: step >= 12,
    challengeIndex: 0,
    challengeAnswers: {},
    mistakes: [],
    retryAnswers: {},
    completed: false
  }));
  const frame = document.getElementById('lesson');
  frame.width = width;
  frame.height = height;
  frame.addEventListener('load', () => { document.documentElement.dataset.ready = 'true'; });
  frame.src = `../lesson-05.html?lang=${lang}&screenshot=${width}x${height}`;
</script>
</html>
