    const OPTION_COPY={P07:{zh:['你好','谢谢','没关系','请给我'],en:['Hello','Thank you','It’s okay','Please give me'],vi:['Xin chào','Cảm ơn','Không sao','Vui lòng đưa cho tôi'],ja:['こんにちは','ありがとう','大丈夫です','ください']},C05:{zh:['来自韩国，住在首尔','来自越南，住在河内','来自中国，住在河内','来自越南，住在首尔'],en:['From Korea, lives in Seoul','From Vietnam, lives in Hanoi','From China, lives in Hanoi','From Vietnam, lives in Seoul'],vi:['Đến từ Hàn Quốc, sống ở Seoul','Đến từ Việt Nam, sống ở Hà Nội','Đến từ Trung Quốc, sống ở Hà Nội','Đến từ Việt Nam, sống ở Seoul'],ja:['韓国出身でソウル在住','ベトナム出身でハノイ在住','中国出身でハノイ在住','ベトナム出身でソウル在住']}};
    const RESULT_COPY={zh:{beginner:'先建立韩文字母、音节与基础发音，再进入生活场景。',foundation:'先补强韩文基础，并保留自由探索其他课程的入口。',k1:'从问候、自我介绍和基础听辨开始最合适。',k2:'你已具备基础，适合从真实生活场景继续提升。',k3:'你能处理多数基础内容，下一步应增加自然语速和表达任务。',review:'复习节奏',meeting:'初次见面任务'},en:{beginner:'Build Hangul, syllables and basic pronunciation before moving into everyday situations.',foundation:'Strengthen your Hangul foundation while keeping other courses open to explore.',k1:'Greetings, introductions and basic listening are the best place to begin.',k2:'You have a foundation and can now grow through real-life situations.',k3:'You handle most basics; next, train with natural speed and speaking tasks.',review:'Review routine',meeting:'First-meeting mission'},vi:{beginner:'Xây dựng nền tảng Hangul, âm tiết và phát âm trước khi vào các tình huống hằng ngày.',foundation:'Củng cố nền tảng Hangul và vẫn có thể khám phá các khóa học khác.',k1:'Nên bắt đầu với chào hỏi, giới thiệu bản thân và nghe cơ bản.',k2:'Bạn đã có nền tảng và phù hợp để tiến bộ qua các tình huống thực tế.',k3:'Bạn xử lý được phần lớn kiến thức cơ bản; bước tiếp theo là tốc độ tự nhiên và nhiệm vụ nói.',review:'Nhịp ôn tập',meeting:'Nhiệm vụ lần đầu gặp mặt'},ja:{beginner:'ハングル、音節、基本発音を身につけてから日常場面へ進みましょう。',foundation:'ハングルの基礎を補強しながら、ほかのコースも自由に探索できます。',k1:'あいさつ、自己紹介、基本的な聞き取りから始めるのが最適です。',k2:'基礎があるため、実際の生活場面から伸ばしていくのがおすすめです。',k3:'基礎内容の多くを理解できています。次は自然な速度と発話課題を増やしましょう。',review:'復習ルーティン',meeting:'初対面ミッション'}};
    const PATH_NAMES={zh:{K0:'韩文基础',K1:'生存韩语',K2:'基础场景',K3:'独立沟通',K4:'自然表达'},en:{K0:'Hangul Foundations',K1:'Survival Korean',K2:'Everyday Basics',K3:'Independent Communication',K4:'Natural Expression'},vi:{K0:'Nền tảng Hangul',K1:'Tiếng Hàn sinh tồn',K2:'Tình huống cơ bản',K3:'Giao tiếp độc lập',K4:'Biểu đạt tự nhiên'},ja:{K0:'ハングル基礎',K1:'サバイバル韓国語',K2:'基本場面',K3:'自立した会話',K4:'自然な表現'}};
    let idx=0,selected=null,answers={},recording=false,stream=null;
    const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
    function normalizeLanguage(value){const v=(value||'').toLowerCase();if(v.startsWith('zh'))return'zh';if(v.startsWith('vi'))return'vi';if(v.startsWith('ja'))return'ja';return'en'}
    function initialLanguage(){const query=new URLSearchParams(location.search).get('lang'),profile=JSON.parse(localStorage.getItem('nikigoProfile')||'{}');if(C[query])return query;if(C[profile.interfaceLanguage])return profile.interfaceLanguage;return normalizeLanguage((navigator.languages&&navigator.languages[0])||navigator.language)}
    function lang(){return $('#lang').value}
    function persistLanguage(){const profile=JSON.parse(localStorage.getItem('nikigoProfile')||'{}');profile.interfaceLanguage=lang();if(!profile.learningLanguage)profile.learningLanguage=lang();localStorage.setItem('nikigoProfile',JSON.stringify(profile));document.documentElement.lang=lang()==='zh'?'zh-CN':lang()}
    function changeDiagnosticLanguage(){persistLanguage();render()}
    function render(){const t=C[lang()];$$('[data-k]').forEach(e=>e.textContent=t[e.dataset.k]||'');persistLanguage();if(!$('#quiz').classList.contains('hidden'))renderQ();if(!$('#results').classList.contains('hidden'))renderResult()}
    function screen(id){['welcome','quiz','results'].forEach(x=>$('#'+x).classList.toggle('hidden',x!==id));render()}
    function showWelcome(){answers={};idx=0;selected=null;screen('welcome')}
    function start(){answers={};idx=0;selected=null;screen('quiz')}
    function beginner(){answers={beginner:true};screen('results')}
    function localizedOptions(q){return OPTION_COPY[q.id]?.[lang()]||q.o}
    function renderQ(){const q=Q[idx],t=C[lang()],options=localizedOptions(q);$('#count').textContent=(idx+1)+' / '+Q.length;$('#bar').style.width=((idx+1)/Q.length*100)+'%';$('#phase').textContent=idx<2?'WARM-UP':idx<7?'CORE':'SPEAK';$('#qid').textContent=q.id;$('#qlevel').textContent=q.level;$('#qskill').textContent=q.skill;$('#prompt').textContent=lang()==='zh'?q.p:(q.loc[lang()]||q.p);$('#audio').classList.toggle('hidden',!q.audio);$('#options').classList.toggle('hidden',!!q.record);$('#record').classList.toggle('hidden',!q.record);$('#next').disabled=!q.record&&selected===null;$('#next').querySelector('span').textContent=idx===Q.length-1?t.finish:t.next;if(q.record){$('#recordText').textContent=q.audio||q.p;$('#recordBtn').textContent=recording?t.stop:t.record}else{$('#options').innerHTML=options.map((o,i)=>`<button class="${selected===i?'on':''}" onclick="choose(${i})"><span>${String.fromCharCode(65+i)}</span><b>${o}</b><i>${selected===i?'✓':''}</i></button>`).join('')}}
    function choose(i){selected=i;renderQ()}
    function speak(){const q=Q[idx];if(!q.audio)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(q.audio);u.lang='ko-KR';u.rate=.82;speechSynthesis.speak(u)}
    async function toggleRecord(){if(recording){stream&&stream.getTracks().forEach(x=>x.stop());recording=false}else{try{stream=await navigator.mediaDevices.getUserMedia({audio:true});recording=true}catch(e){recording=false}}$('#mic').classList.toggle('live',recording);renderQ()}
    function next(){const q=Q[idx];if(!q.record&&selected===null)return;answers[q.id]=q.record?true:selected===q.a;selected=null;if(idx===Q.length-1)screen('results');else{idx++;renderQ()}}
    function skip(){answers[Q[idx].id]=false;selected=null;if(idx===Q.length-1)screen('results');else{idx++;renderQ()}}
    function goBack(){if(idx){idx--;selected=null;renderQ()}else showWelcome()}
    function calc(){if(answers.beginner)return{path:'K0',score:8,focus:'한글 · 발음',reason:'beginner'};const n=Object.values(answers).filter(Boolean).length,s=Math.round(n/Q.length*100);if(s<30)return{path:'K0',score:s,focus:'한글 · 발음',reason:'foundation'};if(s<50)return{path:'K1',score:s,focus:'기초 표현 · 듣기',reason:'k1'};if(s<72)return{path:'K2',score:s,focus:'생활 한국어 · 듣기',reason:'k2'};return{path:'K3',score:s,focus:'자연스러운 대화 · 말하기',reason:'k3'}}
    function renderResult(){const r=calc(),copy=RESULT_COPY[lang()],names=[['한글','LIT',Math.min(96,r.score+12)],['듣기','LIS',Math.max(8,r.score-8)],['어휘','VOC',Math.min(92,r.score+2)],['문법','GRM',Math.max(5,r.score-3)],['말하기','SPK',Math.max(5,r.score-14)],['소통','COM',Math.max(6,r.score-5)]];$('#path').textContent=r.path;$('#focus').textContent=r.focus;$('#score').textContent=r.score;$('#reason').textContent=copy[r.reason];$('#week').innerHTML='01 · '+r.focus+'<br>02 · '+copy.review+'<br>03 · '+copy.meeting;$('#skills').innerHTML=names.map(x=>`<div class="skill"><span>${x[0]}<small>${x[1]}</small></span><div><i style="width:${x[2]}%"></i></div><b>${x[2]}</b></div>`).join('')}
    function storeResult(path,r){const profile=JSON.parse(localStorage.getItem('nikigoProfile')||'{}');profile.path=path;profile.pathName=PATH_NAMES[lang()][path];profile.interfaceLanguage=lang();profile.learningLanguage=profile.learningLanguage||lang();profile.ability=[Math.min(96,r.score+12),Math.max(8,r.score-8),Math.min(92,r.score+2),Math.max(5,r.score-3),Math.max(5,r.score-14),Math.max(6,r.score-5)];localStorage.setItem('nikigoProfile',JSON.stringify(profile));location.href='nikigo-app.html?lang='+lang()+'#dashboard'}
    function acceptResult(){const r=calc();storeResult(r.path,r)}
    function adjustPath(delta){const r=calc(),n=Math.max(0,Math.min(4,Number(r.path.slice(1))+delta));storeResult('K'+n,r)}
    $('#lang').value=initialLanguage();
    render();
  </script>
</body>
