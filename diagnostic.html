<html lang="zh-CN">
<head>

  <title>Nikigo · Korean Placement Check</title>
  <style>
    :root{--p:#6d4aff;--d:#30285e;--i:#211b3b;--m:#746e8c;--l:#e7e2f2;--v:#f4f0ff;--g:#dff6aa;--bg:#fbfaff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 10%,#eee7ff,transparent 28%),radial-gradient(circle at 92% 88%,#eaf9c9,transparent 23%),var(--bg);color:var(--i);font-family:Inter,"Noto Sans KR","Noto Sans SC",system-ui,sans-serif;min-height:100vh}.shell{max-width:1180px;margin:auto;padding:0 28px 50px}.top{height:76px;display:flex;align-items:center;justify-content:space-between}.logo{border:0;background:none;color:var(--p);font-weight:900;font-size:24px;cursor:pointer}.logo b{color:#f0b83e;font-size:14px}.logo small{font-size:10px;background:var(--v);padding:4px 6px;border-radius:7px}.top select{border:1px solid var(--l);border-radius:999px;background:white;padding:9px 34px 9px 14px;color:var(--i)}button{font-family:inherit}.welcome{min-height:calc(100vh - 125px);display:grid;grid-template-columns:1.15fr .75fr;gap:76px;align-items:center}.tag{color:var(--p);font-size:13px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.welcome h1{font-size:clamp(46px,6vw,78px);line-height:1.03;letter-spacing:-.055em;margin:23px 0}.lead{font-size:18px;line-height:1.75;color:var(--m);max-width:690px}.meta{display:flex;flex-wrap:wrap;gap:9px;margin:25px 0}.meta span{background:#fff;border:1px solid var(--l);border-radius:999px;padding:9px 13px;font-size:13px}.actions{display:flex;gap:12px;flex-wrap:wrap}.primary,.secondary{border-radius:16px;padding:15px 22px;font-weight:850;font-size:15px;cursor:pointer}.primary{border:0;background:var(--p);color:#fff;box-shadow:0 12px 28px #6d4aff35}.secondary{border:1px solid var(--l);background:#fff;color:var(--i)}.primary:disabled{opacity:.38}.demo{min-height:470px;background:linear-gradient(150deg,var(--d),#744cff);border-radius:34px;padding:30px;color:#fff;box-shadow:0 38px 70px #4d388b35;transform:rotate(2deg);display:flex;flex-direction:column;justify-content:space-between;align-items:center}.demoHead{width:100%;display:flex;justify-content:space-between}.demoHead b{font-size:11px;background:#ffffff20;padding:6px 10px;border-radius:999px}.ring{width:176px;height:176px;border:13px solid #a58cff;border-top-color:var(--g);border-radius:50%;display:grid;place-items:center;text-align:center}.ring strong{display:block;font-size:56px}.ring small{opacity:.6}.bars{width:100%;display:grid;gap:10px}.bars i{height:7px;background:#ffffff22;border-radius:9px;overflow:hidden}.bars span{display:block;height:100%;background:linear-gradient(90deg,var(--g),#fff);border-radius:9px}.quiz,.results{max-width:990px;margin:24px auto}.quizTop{display:flex;align-items:center;gap:16px;margin-bottom:25px}.back{width:44px;height:44px;border:1px solid var(--l);background:#fff;border-radius:50%;font-size:20px;cursor:pointer}.progress{flex:1}.progress div:first-child{display:flex;justify-content:space-between;font-size:12px;color:var(--m);margin-bottom:8px}.track{height:7px;background:#e9e3f6;border-radius:9px;overflow:hidden}.track i{display:block;height:100%;background:linear-gradient(90deg,var(--p),#aa8fff);transition:.35s}.phase{font-size:11px;font-weight:900;letter-spacing:.12em;color:var(--p)}.card{background:white;border:1px solid var(--l);border-radius:30px;padding:42px;box-shadow:0 28px 60px #44387612}.chips{display:flex;gap:8px}.chips span{font-size:10px;background:var(--v);color:var(--p);font-weight:900;border-radius:999px;padding:6px 9px}.card h2{font-size:clamp(25px,4vw,38px);line-height:1.3;margin:27px 0}.audio{width:100%;display:flex;align-items:center;border:1px solid #ddd3ff;background:var(--v);color:var(--d);border-radius:18px;padding:14px;cursor:pointer}.play{width:42px;height:42px;background:var(--p);color:white;border-radius:50%;display:grid;place-items:center;margin-right:13px}.audio small{display:block;color:var(--m);margin-top:3px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:25px 0}.opts button{min-height:68px;border:1px solid var(--l);background:white;border-radius:17px;padding:13px 15px;display:flex;align-items:center;text-align:left;color:var(--i);cursor:pointer}.opts button:hover,.opts .on{border-color:var(--p);background:var(--v);box-shadow:0 0 0 3px #6d4aff12}.opts span{width:32px;height:32px;display:grid;place-items:center;background:#f4f2f7;border-radius:9px;font-weight:800;margin-right:12px}.opts i{margin-left:auto;color:var(--p);font-style:normal}.cardFoot{display:flex;justify-content:space-between;align-items:center;margin-top:30px}.skip{border:0;background:none;text-decoration:underline;color:var(--m);cursor:pointer}.recordBox{text-align:center;border:1px dashed #cfc4f4;background:#faf8ff;border-radius:22px;padding:28px}.mic{width:68px;height:68px;border-radius:50%;display:grid;place-items:center;margin:auto;background:#eae4ff;color:var(--p);font-size:24px}.mic.live{background:#ffe8eb;color:#e04a5d;animation:pulse 1.2s infinite}.recordBox p{font-size:21px;font-weight:800}.textBtn{border:0;background:none;color:var(--p);font-weight:800;cursor:pointer}.rec{display:block;margin:14px auto 0;border:0;border-radius:14px;background:var(--p);color:#fff;padding:13px 18px;font-weight:850;cursor:pointer}@keyframes pulse{50%{box-shadow:0 0 0 14px #ff819522}}.resultHero{background:linear-gradient(120deg,var(--d),var(--p));border-radius:30px;padding:31px;color:#fff;box-shadow:0 25px 60px #44387625}.resultHero .tag{color:#d8ccff}.path{display:grid;grid-template-columns:180px 1fr;align-items:center;margin-top:20px}.path>div:first-child{border-right:1px solid #ffffff25}.path small{font-size:10px;letter-spacing:.14em;opacity:.65}.path strong{display:block;font-size:64px;color:var(--g)}.path div:last-child{padding-left:32px}.path h1{margin:0 0 8px;font-size:32px}.path p{margin:0;opacity:.7}.grid{display:grid;grid-template-columns:1.25fr .75fr;gap:18px;margin-top:18px}.ability,.reason,.pathBtns{background:white;border:1px solid var(--l);border-radius:25px;padding:26px}.titleRow{display:flex;justify-content:space-between}.titleRow span,.reason>span{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--p);font-weight:900}.titleRow h2{margin:4px 0}.score{font-size:32px;color:var(--p)}.score small{font-size:11px;color:var(--m)}.skillList{display:grid;gap:15px;margin-top:22px}.skill{display:grid;grid-template-columns:110px 1fr 32px;align-items:center;gap:12px}.skill>span{font-weight:800}.skill>span small{display:block;font-size:9px;color:var(--m)}.skill div{height:8px;background:#eeeaf4;border-radius:10px;overflow:hidden}.skill i{display:block;height:100%;background:linear-gradient(90deg,var(--p),#b096ff)}.side{display:grid;gap:18px}.reason h3{line-height:1.55;margin:12px 0 20px}.focus{background:var(--v);border-radius:16px;padding:15px;color:var(--m);line-height:1.75}.focus b{color:var(--i)}.pathBtns{display:grid;gap:8px}.pathBtns button:not(.primary){border:1px solid var(--l);background:white;border-radius:13px;padding:11px;color:var(--m);cursor:pointer}.restart{display:block;margin:20px auto;border:0;background:none;color:var(--m);cursor:pointer}.hidden{display:none!important}
    @media(max-width:760px){.shell{padding:0 16px 28px}.top{height:66px}.welcome{grid-template-columns:1fr;gap:28px;padding:40px 0}.demo{order:-1;min-height:350px;transform:none}.welcome h1{font-size:45px}.lead{font-size:16px}.actions>*{width:100%}.card{padding:25px 18px;border-radius:23px}.opts{grid-template-columns:1fr}.phase{display:none}.resultHero{padding:24px 20px}.path{grid-template-columns:100px 1fr}.path strong{font-size:48px}.path div:last-child{padding-left:18px}.path h1{font-size:22px}.grid{grid-template-columns:1fr}.skill{grid-template-columns:86px 1fr 28px}.top select{max-width:137px}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><button class="logo" onclick="showWelcome()"><b>✦</b> Nikigo <small>2.0</small></button><select id="lang" aria-label="Interface language" onchange="render()"><option value="zh">简体中文</option><option value="en">English</option><option value="vi">Tiếng Việt</option><option value="ja">日本語</option></select></header>
    <section id="welcome" class="welcome"><div><span class="tag" data-k="tag"></span><h1 data-k="title"></h1><p class="lead" data-k="desc"></p><div class="meta"><span>◷ <b data-k="time"></b></span><span>◇ <b data-k="free"></b></span><span>✓ 6 skills</span></div><div class="actions"><button class="primary" onclick="start()"><span data-k="start"></span> →</button><button class="secondary" onclick="beginner()" data-k="zero"></button></div></div><div class="demo"><div class="demoHead"><span>나의 한국어</span><b>Preview</b></div><div class="ring"><div><strong>6</strong><small>skills</small></div></div><div class="bars"><i><span style="width:82%"></span></i><i><span style="width:66%"></span></i><i><span style="width:72%"></span></i><i><span style="width:54%"></span></i></div><small>Personal path, not a fixed level.</small></div></section>
    <section id="quiz" class="quiz hidden"><div class="quizTop"><button class="back" onclick="goBack()">←</button><div class="progress"><div><span data-k="progress"></span><b id="count"></b></div><div class="track"><i id="bar"></i></div></div><span class="phase" id="phase"></span></div><article class="card"><div class="chips"><span id="qid"></span><span id="qlevel"></span><span id="qskill"></span></div><h2 id="prompt"></h2><button id="audio" class="audio hidden" onclick="speak()"><span class="play">▶</span><span><b data-k="listen"></b><small>0:04 · Korean</small></span></button><div id="options" class="opts"></div><div id="record" class="recordBox hidden"><div id="mic" class="mic">●</div><p id="recordText"></p><button class="textBtn" onclick="speak()">▶ <span data-k="listen"></span></button><button class="rec" onclick="toggleRecord()" id="recordBtn"></button></div><div class="cardFoot"><button class="skip" onclick="skip()" data-k="skip"></button><button id="next" class="primary" onclick="next()" disabled><span data-k="next"></span> →</button></div></article></section>
    <section id="results" class="results hidden"><div class="resultHero"><span class="tag">✦ <span data-k="result"></span></span><div class="path"><div><small>YOUR PATH</small><strong id="path"></strong></div><div><h1 id="focus"></h1><p data-k="observe"></p></div></div></div><div class="grid"><article class="ability"><div class="titleRow"><div><span data-k="abilities"></span><h2>나의 한국어</h2></div><b class="score"><span id="score"></span><small>/100</small></b></div><div id="skills" class="skillList"></div></article><div class="side"><article class="reason"><span data-k="reason"></span><h3 id="reason"></h3><div class="focus"><b data-k="firstWeek"></b><br><span id="week"></span></div></article><article class="pathBtns"><button class="primary" data-k="accept"></button><button data-k="lower"></button><button data-k="higher"></button></article></div></div><button class="restart" onclick="showWelcome()">↻ <span data-k="restart"></span></button></section>
  </main>
  <script>
    const C={zh:{tag:'韩语能力诊断',title:'从真实能力开始学习',desc:'用约 5–8 分钟了解你的韩语听力、词汇、语法与场景沟通能力。结果只用于推荐起点，不是考试。',start:'开始诊断',zero:'我是完全零基础',time:'约 5–8 分钟',free:'首次诊断免费',skip:'暂时跳过',next:'下一题',finish:'查看结果',listen:'播放韩语',record:'开始跟读',stop:'完成录音',progress:'诊断进度',result:'你的建议学习起点',reason:'推荐理由',abilities:'能力画像',accept:'接受推荐',lower:'从更基础开始',higher:'挑战更高难度',restart:'重新体验',observe:'完成更多课程后，我们会持续校准你的能力。',firstWeek:'首周训练重点'},en:{tag:'Korean Placement Check',title:'Start from your real ability',desc:'In about 5–8 minutes, we’ll check your Korean listening, vocabulary, grammar and communication skills. This is not an exam.',start:'Start check',zero:'I’m a complete beginner',time:'About 5–8 minutes',free:'First check is free',skip:'Skip for now',next:'Next',finish:'See result',listen:'Play Korean',record:'Start repeating',stop:'Finish recording',progress:'Progress',result:'Your recommended starting point',reason:'Why this fits',abilities:'Ability profile',accept:'Accept recommendation',lower:'Start easier',higher:'Try a harder path',restart:'Try again',observe:'We’ll refine this as you complete more lessons.',firstWeek:'Focus for your first week'},vi:{tag:'Kiểm tra trình độ tiếng Hàn',title:'Bắt đầu từ năng lực thực tế',desc:'Trong khoảng 5–8 phút, Nikigo sẽ kiểm tra nghe, từ vựng, ngữ pháp và giao tiếp tiếng Hàn. Đây không phải là kỳ thi.',start:'Bắt đầu',zero:'Tôi hoàn toàn mới học',time:'Khoảng 5–8 phút',free:'Lần kiểm tra đầu miễn phí',skip:'Tạm thời bỏ qua',next:'Tiếp theo',finish:'Xem kết quả',listen:'Phát tiếng Hàn',record:'Bắt đầu đọc theo',stop:'Hoàn tất ghi âm',progress:'Tiến độ',result:'Điểm bắt đầu được đề xuất',reason:'Lý do đề xuất',abilities:'Hồ sơ năng lực',accept:'Chấp nhận đề xuất',lower:'Bắt đầu dễ hơn',higher:'Thử mức khó hơn',restart:'Thử lại',observe:'Chúng tôi sẽ điều chỉnh khi bạn hoàn thành thêm bài học.',firstWeek:'Trọng tâm tuần đầu'},ja:{tag:'韓国語レベルチェック',title:'今の実力から学習を始めよう',desc:'約5～8分で、韓国語のリスニング・語彙・文法・コミュニケーション力を確認します。試験ではありません。',start:'チェックを始める',zero:'完全な初心者です',time:'約5～8分',free:'初回チェックは無料',skip:'今はスキップ',next:'次へ',finish:'結果を見る',listen:'韓国語を再生',record:'音読を始める',stop:'録音を終了',progress:'進捗',result:'おすすめの学習開始地点',reason:'おすすめの理由',abilities:'能力プロフィール',accept:'おすすめを選ぶ',lower:'より基礎から始める',higher:'難しいコースに挑戦',restart:'もう一度試す',observe:'学習を続けながら、判定を調整します。',firstWeek:'最初の1週間の重点'}};
    const Q=[{id:'P01',level:'K0',skill:'한글',p:'选择元音 ‘ㅏ’',loc:{en:'Choose the vowel ‘ㅏ’.',vi:'Chọn nguyên âm ‘ㅏ’.',ja:'母音「ㅏ」を選んでください。'},o:['ㅓ','ㅗ','ㅏ','ㅜ'],a:2},{id:'P04',level:'K0',skill:'한글',p:'哪个音节包含收音？',loc:{en:'Which syllable has a final consonant?',vi:'Âm tiết nào có phụ âm cuối?',ja:'パッチムがある音節はどれですか。'},o:['가','나','한','도'],a:2},{id:'P07',level:'K1',skill:'듣기',p:'听音频，选择最接近的意思。',loc:{en:'Listen and choose the closest meaning.',vi:'Nghe và chọn nghĩa gần đúng nhất.',ja:'音声を聞いて最も近い意味を選んでください。'},audio:'감사합니다.',o:['你好 / Hello','谢谢 / Thank you','没关系 / It’s okay','请给我 / Please give me'],a:1},{id:'C02',level:'K1',skill:'문법',p:'将词块排列成自然的韩语句子。',loc:{en:'Choose the most natural sentence.',vi:'Chọn câu tiếng Hàn tự nhiên nhất.',ja:'最も自然な韓国語の文を選んでください。'},o:['저는 중국에서 왔어요.','중국에서 저는 왔어요.','왔어요 저는 중국에서.','저는 왔어요 중국에서.'],a:0},{id:'C05',level:'K2',skill:'듣기',p:'听音频，选择正确的信息。',loc:{en:'Listen and choose the correct information.',vi:'Nghe và chọn thông tin đúng.',ja:'音声を聞いて正しい情報を選んでください。'},audio:'저는 베트남에서 왔고 지금 하노이에 살아요.',o:['来自韩国，住在首尔','来自越南，住在河内','来自中国，住在河内','来自越南，住在首尔'],a:1},{id:'C07',level:'K2',skill:'문법',p:'어제 친구를 ___.',loc:{en:'Choose the form that matches “yesterday.”',vi:'Chọn dạng phù hợp với “hôm qua”.',ja:'「昨日」に合う形を選んでください。'},o:['만나요','만났어요','만날 거예요','만나고 싶어요'],a:1},{id:'C10',level:'K3',skill:'소통',p:'向第一次见面的长辈询问姓名。',loc:{en:'Ask an older person’s name politely.',vi:'Hỏi tên người lớn tuổi một cách lịch sự.',ja:'年上の人に丁寧に名前を尋ねてください。'},o:['이름이 뭐야?','성함이 어떻게 되세요?','너 누구예요?','이름 말해 주세요.'],a:1},{id:'S02',level:'K3',skill:'말하기',p:'오늘은 시간이 없어서 내일 만나는 게 좋을 것 같아요.',loc:{en:'Listen and repeat naturally.',vi:'Nghe và lặp lại tự nhiên.',ja:'音声を聞いて自然に繰り返してください。'},audio:'오늘은 시간이 없어서 내일 만나는 게 좋을 것 같아요.',record:true,o:[],a:0}];
    let idx=0,selected=null,answers={},recording=false,stream=null;const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);function lang(){return $('#lang').value}function render(){const t=C[lang()];$$('[data-k]').forEach(e=>e.textContent=t[e.dataset.k]||'');if(!$('#quiz').classList.contains('hidden'))renderQ();if(!$('#results').classList.contains('hidden'))renderResult()}function screen(id){['welcome','quiz','results'].forEach(x=>$('#'+x).classList.toggle('hidden',x!==id));render()}function showWelcome(){answers={};idx=0;selected=null;screen('welcome')}function start(){answers={};idx=0;selected=null;screen('quiz')}function beginner(){answers={beginner:true};screen('results')}function renderQ(){const q=Q[idx],t=C[lang()];$('#count').textContent=(idx+1)+' / '+Q.length;$('#bar').style.width=((idx+1)/Q.length*100)+'%';$('#phase').textContent=idx<2?'WARM-UP':idx<7?'CORE':'SPEAK';$('#qid').textContent=q.id;$('#qlevel').textContent=q.level;$('#qskill').textContent=q.skill;$('#prompt').textContent=lang()==='zh'?q.p:(q.loc[lang()]||q.p);$('#audio').classList.toggle('hidden',!q.audio);$('#options').classList.toggle('hidden',!!q.record);$('#record').classList.toggle('hidden',!q.record);$('#next').disabled=!q.record&&selected===null;$('#next').querySelector('span').textContent=idx===Q.length-1?t.finish:t.next;if(q.record){$('#recordText').textContent=q.p;$('#recordBtn').textContent=recording?t.stop:t.record}else{$('#options').innerHTML=q.o.map((o,i)=>`<button class="${selected===i?'on':''}" onclick="choose(${i})"><span>${String.fromCharCode(65+i)}</span><b>${o}</b><i>${selected===i?'✓':''}</i></button>`).join('')}}function choose(i){selected=i;renderQ()}function speak(){const q=Q[idx];if(!q.audio)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(q.audio);u.lang='ko-KR';u.rate=.82;speechSynthesis.speak(u)}async function toggleRecord(){if(recording){stream&&stream.getTracks().forEach(x=>x.stop());recording=false}else{try{stream=await navigator.mediaDevices.getUserMedia({audio:true});recording=true}catch(e){recording=false}}$('#mic').classList.toggle('live',recording);renderQ()}function next(){const q=Q[idx];if(!q.record&&selected===null)return;answers[q.id]=q.record?true:selected===q.a;selected=null;if(idx===Q.length-1)screen('results');else{idx++;renderQ()}}function skip(){answers[Q[idx].id]=false;selected=null;if(idx===Q.length-1)screen('results');else{idx++;renderQ()}}function goBack(){if(idx){idx--;selected=null;renderQ()}else showWelcome()}function calc(){if(answers.beginner)return{path:'K0',score:8,focus:'한글 · 발음',reason:'先建立韩文字母、音节与基础发音，再进入生活场景。'};const n=Object.values(answers).filter(Boolean).length,s=Math.round(n/Q.length*100);if(s<30)return{path:'K0',score:s,focus:'한글 · 발음',reason:'先补强韩文基础，并保留自由探索其他课程的入口。'};if(s<50)return{path:'K1',score:s,focus:'기초 표현 · 듣기',reason:'从问候、自我介绍和基础听辨开始最合适。'};if(s<72)return{path:'K2',score:s,focus:'생활 한국어 · 듣기',reason:'你已具备基础，适合从真实生活场景继续提升。'};return{path:'K3',score:s,focus:'자연스러운 대화 · 말하기',reason:'你能处理多数基础内容，下一步应增加自然语速和表达任务。'}}function renderResult(){const r=calc(),names=[['한글','LIT',Math.min(96,r.score+12)],['듣기','LIS',Math.max(8,r.score-8)],['어휘','VOC',Math.min(92,r.score+2)],['문법','GRM',Math.max(5,r.score-3)],['말하기','SPK',Math.max(5,r.score-14)],['소통','COM',Math.max(6,r.score-5)]];$('#path').textContent=r.path;$('#focus').textContent=r.focus;$('#score').textContent=r.score;$('#reason').textContent=r.reason;$('#week').innerHTML='01 · '+r.focus+'<br>02 · 복습 루틴<br>03 · 첫 만남 mission';$('#skills').innerHTML=names.map(x=>`<div class="skill"><span>${x[0]}<small>${x[1]}</small></span><div><i style="width:${x[2]}%"></i></div><b>${x[2]}</b></div>`).join('')}render();
    render();
  </script>
</body>
</html>
