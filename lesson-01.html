      ja:{lessonName:'第1課 · ハングル：最初の一歩',progress:'レッスン進捗',back:'戻る',continue:'続ける',finish:'レッスンを完了',introTag:'K0 · ハングル基礎',introTitle:'ハングル：最初の一歩',introLead:'約10～12分で、4つの基本母音と2つの子音を学び、最初の韓国語音節を組み立てます。',goal1:'聞く',goal1d:'ㅏ・ㅓ・ㅗ・ㅜを聞き分ける',goal2:'見分ける',goal2d:'ㄱとㄴを覚える',goal3:'組み立てる',goal3d:'가・나などの音節を作る',tip:'韓国語の音節は積み木のようなものです。子音と母音が一つの四角の中で組み合わさります。今日は仕組みを理解できれば十分です。',vowelTag:'学習 · 母音',vowelTitle:'4つの基本母音から始めよう',vowelLead:'すべてのカードをタップして音を聞きましょう。母音だけを発音するときは、音のないㅇを加えて音節にします。',tapAll:'まず4つの音をすべて聞いてください',vA:'口を開けて、はっきり「ア」と発音します。',vEo:'舌をリラックスさせ、開いた「オ」と「ア」の中間の音。',vO:'唇を丸め、前寄りで発音します。',vU:'唇を丸め、より深く後ろで発音します。',conTag:'学習 · 子音',conTitle:'次は2つの子音',conLead:'子音は音節の最初に置かれ、母音と組み合わさります。タップして例を聞きましょう。',gDesc:'語頭では軽いk/gの音。例：가',nDesc:'日本語のナ行に近いnの音。例：나',builderTag:'組み立て · 音節',builderTitle:'積み木のように組み合わせよう',builderLead:'子音と母音を一つずつ選び、できる音節を確認します。가と나を作ってください。',consonant:'子音',vowel:'母音',yourSyllable:'できた音節',built:'作った音節',buildMore:'가と나の両方を作ってください',practiceTag:'練習',listen:'韓国語を再生',played:'もう一度再生',nextQuestion:'次の問題',correct:'正解です！',incorrect:'もう一度確認しましょう。正解は{answer}です。',practice1:'母音ㅏを選んでください。',practice2:'音を聞いて、対応する母音を選んでください。',practice3:'「na」と読む音節はどれですか。',repeatTag:'音読 · セルフチェック',repeatTitle:'一度聞いて、自分で読んでみよう',repeatLead:'お手本を聞いてから、2つの音節をはっきり読みましょう。録音は送信されません。自分で確認してください。',listenPhrase:'가, 나を再生',again:'もう一度聞く',needPractice:'もう少し練習',soundsGood:'うまく言えた',chooseCheck:'感覚を選んでください',challengeTag:'5問チャレンジ',challengeTitle:'確認テストに挑戦しよう',challengeLead:'5つの短い問題で、今日の文字と音節を見分け、聞き取れるか確認します。',startChallenge:'チャレンジ開始',question:'チャレンジ',completeTag:'LESSON COMPLETE',completeTitle:'第1課、完了！',completeLead:'文字から韓国語の音節へ、最初の一歩を進みました。',score:'チャレンジ得点',xp:'+50 XP',reviewAdded:'復習に追加',reviewTitle:'次に復習する内容',reviewPerfect:'よくできました！記憶を強くするため、母音のクイック復習を1回予定します。',reviewNeeds:'間違えた問題は復習センターに追加され、次回優先して表示されます。',returnHome:'学習ホームへ戻る',replay:'もう一度学ぶ',q1:'母音ㅗを選んでください。',q2:'音を聞いて正しい母音を選んでください。',q3:'ㄱ + ㅏはどの音節になりますか。',q4:'音節나を選んでください。',q5:'音を聞いて正しい音節を選んでください。'}
    };
    const vowels=[['ㅏ','a','아','vA'],['ㅓ','eo','어','vEo'],['ㅗ','o','오','vO'],['ㅜ','u','우','vU']];
    const consonants=[['ㄱ','g/k','가','gDesc'],['ㄴ','n','나','nDesc']];
    const syllables={'ㄱㅏ':'가','ㄱㅓ':'거','ㄱㅗ':'고','ㄱㅜ':'구','ㄴㅏ':'나','ㄴㅓ':'너','ㄴㅗ':'노','ㄴㅜ':'누'};
    const practice=[{prompt:'practice1',options:['ㅓ','ㅏ','ㅗ','ㅜ'],answer:1},{prompt:'practice2',audio:'어',options:['ㅏ','ㅜ','ㅓ','ㅗ'],answer:2},{prompt:'practice3',options:['가','너','나','고'],answer:2}];
    const quiz=[{prompt:'q1',options:['ㅏ','ㅗ','ㅓ','ㅜ'],answer:1},{prompt:'q2',audio:'우',options:['ㅗ','ㅓ','ㅜ','ㅏ'],answer:2},{prompt:'q3',options:['거','나','가','고'],answer:2},{prompt:'q4',options:['너','가','고','나'],answer:3},{prompt:'q5',audio:'가',options:['나','거','가','노'],answer:2}];
    const screens=[{type:'intro'},{type:'vowels'},{type:'consonants'},{type:'builder'},...practice.map((_,q)=>({type:'practice',q})),{type:'repeat'},{type:'challenge'},...quiz.map((_,q)=>({type:'quiz',q})),{type:'complete'}];
    let lang=initialLanguage(),index=0,selected=null,selfCheck=null,finished=false,earnedXp=false;
    const heardVowels=new Set(),heardConsonants=new Set(),built=new Set(),practiceAnswers={},quizAnswers={};
    let builderC='ㄱ',builderV='ㅏ';
    const $=selector=>document.querySelector(selector);
    function normalizeLanguage(value){const v=(value||'').toLowerCase();if(v.startsWith('zh'))return'zh';if(v.startsWith('vi'))return'vi';if(v.startsWith('ja'))return'ja';return'en'}
    function initialLanguage(){const query=new URLSearchParams(location.search).get('lang');if(supported.includes(query))return query;if(supported.includes(profile.interfaceLanguage))return profile.interfaceLanguage;return normalizeLanguage((navigator.languages&&navigator.languages[0])||navigator.language)}
    function t(key){return COPY[lang][key]||COPY.en[key]||key}
    function saveProfile(){profile.interfaceLanguage=lang;localStorage.setItem('nikigoProfile',JSON.stringify(profile))}
    function changeLanguage(value){lang=supported.includes(value)?value:'en';saveProfile();render()}
    function speak(value){speechSynthesis.cancel();const voice=new SpeechSynthesisUtterance(value);voice.lang='ko-KR';voice.rate=.72;speechSynthesis.speak(voice)}
    function toast(message){const el=$('#toast');el.textContent=message;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1900)}
    function progress(){return Math.round(index/(screens.length-1)*100)}
    function shell(body){return `${body}<div class="foot"><button class="ghost" onclick="previous()">← ${t('back')}</button><button class="primary" id="nextButton" onclick="next()">${t(index===screens.length-2?'finish':'continue')} →</button></div>`}
    function render(){document.documentElement.lang=lang==='zh'?'zh-CN':lang;$('#language').value=lang;$('#lessonName').textContent=t('lessonName');$('#progressLabel').textContent=t('progress');$('#progressCount').textContent=(index+1)+' / '+screens.length;$('#progressBar').style.width=progress()+'%';const screen=screens[index];let html='';if(screen.type==='intro')html=renderIntro();if(screen.type==='vowels')html=renderVowels();if(screen.type==='consonants')html=renderConsonants();if(screen.type==='builder')html=renderBuilder();if(screen.type==='practice')html=renderQuestion(practice[screen.q],false,screen.q);if(screen.type==='repeat')html=renderRepeat();if(screen.type==='challenge')html=renderChallenge();if(screen.type==='quiz')html=renderQuestion(quiz[screen.q],true,screen.q);if(screen.type==='complete')html=renderComplete();$('#content').innerHTML=html;applyGate(screen)}
    function renderIntro(){return shell(`<span class="eyebrow">${t('introTag')}</span><h1>${t('introTitle')}</h1><p class="lead">${t('introLead')}</p><div class="goals"><div class="goal"><b>👂 ${t('goal1')}</b><span>${t('goal1d')}</span></div><div class="goal"><b>🔤 ${t('goal2')}</b><span>${t('goal2d')}</span></div><div class="goal"><b>🧩 ${t('goal3')}</b><span>${t('goal3d')}</span></div></div><div class="note">💡 ${t('tip')}</div>`)}
    function renderVowels(){return shell(`<span class="eyebrow">${t('vowelTag')}</span><h1>${t('vowelTitle')}</h1><p class="lead">${t('vowelLead')}</p><div class="learnGrid">${vowels.map((v,i)=>`<button class="soundCard ${heardVowels.has(i)?'done':''}" onclick="hearVowel(${i})"><span class="play">▶</span><span class="jamo">${v[0]}</span><span class="roman">${v[1]} · ${v[2]}</span><p>${t(v[3])}</p></button>`).join('')}</div>${heardVowels.size<4?`<div class="note">🎧 ${t('tapAll')} · ${heardVowels.size}/4</div>`:''}`)}
    function renderConsonants(){return shell(`<span class="eyebrow">${t('conTag')}</span><h1>${t('conTitle')}</h1><p class="lead">${t('conLead')}</p><div class="learnGrid consonants">${consonants.map((v,i)=>`<button class="soundCard ${heardConsonants.has(i)?'done':''}" onclick="hearConsonant(${i})"><span class="play">▶</span><span class="jamo">${v[0]}</span><span class="roman">${v[1]} · ${v[2]}</span><p>${t(v[3])}</p></button>`).join('')}</div>`)}
    function renderBuilder(){const result=syllables[builderC+builderV];return shell(`<span class="eyebrow">${t('builderTag')}</span><h1>${t('builderTitle')}</h1><p class="lead">${t('builderLead')}</p><div class="builder"><div class="pickGroup"><label>${t('consonant')}</label><div class="picks">${['ㄱ','ㄴ'].map(x=>`<button class="pick ${builderC===x?'on':''}" onclick="chooseBuilder('c','${x}')">${x}</button>`).join('')}</div></div><b class="operator">+</b><div class="pickGroup"><label>${t('vowel')}</label><div class="picks">${['ㅏ','ㅓ','ㅗ','ㅜ'].map(x=>`<button class="pick ${builderV===x?'on':''}" onclick="chooseBuilder('v','${x}')">${x}</button>`).join('')}</div></div><b class="operator">=</b><button class="buildResult" onclick="buildCurrent()"><span><small>${t('yourSyllable')} · ▶</small><strong>${result}</strong></span></button></div><div class="builtList"><b>${t('built')}:</b>${[...built].map(x=>`<span>${x}</span>`).join('')}</div>${!(built.has('가')&&built.has('나'))?`<div class="note">🧩 ${t('buildMore')}</div>`:''}`)}
    function renderQuestion(q,isQuiz,qIndex){const answers=isQuiz?quizAnswers:practiceAnswers,answer=answers[qIndex];const feedback=answer?`<div class="feedback ${answer.correct?'good':'try'}">${answer.correct?t('correct'):t('incorrect').replace('{answer}',q.options[q.answer])}</div>`:'';return shell(`<span class="eyebrow">${isQuiz?t('question')+' '+(qIndex+1)+' / 5':t('practiceTag')+' · '+(qIndex+1)+' / 3'}</span><h2 class="question">${t(q.prompt)}</h2>${q.audio?`<button class="audioBtn" onclick="speak('${q.audio}')"><i>▶</i><span><b>${t('listen')}</b><small>0:02 · Korean</small></span></button>`:''}<div class="options">${q.options.map((option,i)=>{let cls='';if(answer){if(i===q.answer)cls='correct';else if(i===answer.choice)cls='wrong'}return`<button class="option ${cls}" onclick="answerQuestion(${i},${isQuiz},${qIndex})" ${answer?'disabled':''}><span>${String.fromCharCode(65+i)}</span>${option}</button>`}).join('')}</div>${feedback}`)}
    function renderRepeat(){return shell(`<span class="eyebrow">${t('repeatTag')}</span><h1>${t('repeatTitle')}</h1><p class="lead">${t('repeatLead')}</p><div class="repeatBox"><small>${t('listenPhrase')}</small><div class="repeatText">가 · 나</div><div class="repeatActions"><button class="primary" onclick="speak('가, 나')">▶ ${t('again')}</button></div><div class="selfCheck"><button class="${selfCheck==='practice'?'on':''}" onclick="setSelfCheck('practice')">↻ ${t('needPractice')}</button><button class="${selfCheck==='good'?'on':''}" onclick="setSelfCheck('good')">✓ ${t('soundsGood')}</button></div></div>${!selfCheck?`<div class="note">${t('chooseCheck')}</div>`:''}`)}
    function renderChallenge(){return `<div class="challengeHero"><div class="challengeIcon">◆</div><span class="eyebrow" style="margin-top:25px">${t('challengeTag')}</span><h1>${t('challengeTitle')}</h1><p class="lead" style="margin:auto">${t('challengeLead')}</p></div><div class="foot"><button class="ghost" onclick="previous()">← ${t('back')}</button><button class="primary" onclick="next()">${t('startChallenge')} →</button></div>`}
    function renderComplete(){finishLesson();const score=Object.values(quizAnswers).filter(x=>x.correct).length,perfect=score===5;return `<div class="complete"><span class="eyebrow">${t('completeTag')}</span><h1>${t('completeTitle')}</h1><p class="lead" style="margin:auto">${t('completeLead')}</p><div class="scoreRing" style="--score:${score/5*100}%"><div><span><strong>${score}/5</strong><small>${t('score')}</small></span></div></div><div class="rewards"><span class="reward">✦ ${earnedXp?t('xp'):'+0 XP'}</span><span class="reward">↻ ${t('reviewAdded')}</span></div><div class="reviewBox"><b>${t('reviewTitle')}</b><br>${perfect?t('reviewPerfect'):t('reviewNeeds')}</div><div class="repeatActions"><button class="secondary" onclick="restartLesson()">↻ ${t('replay')}</button><button class="primary" onclick="exitLesson()">${t('returnHome')} →</button></div></div>`}
    function applyGate(screen){const button=$('#nextButton');if(!button)return;let allowed=true;if(screen.type==='vowels')allowed=heardVowels.size===4;if(screen.type==='consonants')allowed=heardConsonants.size===2;if(screen.type==='builder')allowed=built.has('가')&&built.has('나');if(screen.type==='practice')allowed=!!practiceAnswers[screen.q];if(screen.type==='repeat')allowed=!!selfCheck;if(screen.type==='quiz')allowed=!!quizAnswers[screen.q];button.disabled=!allowed}
    function hearVowel(i){heardVowels.add(i);speak(vowels[i][2]);render()}
    function hearConsonant(i){heardConsonants.add(i);speak(consonants[i][2]);render()}
    function chooseBuilder(type,value){if(type==='c')builderC=value;else builderV=value;render()}
    function buildCurrent(){const result=syllables[builderC+builderV];built.add(result);speak(result);render()}
    function answerQuestion(choice,isQuiz,qIndex){const bank=isQuiz?quiz:practice,answers=isQuiz?quizAnswers:practiceAnswers,q=bank[qIndex];if(answers[qIndex])return;answers[qIndex]={choice,correct:choice===q.answer};render()}
    function setSelfCheck(value){selfCheck=value;if(value==='practice'){const items=new Set(profile.reviewItems||[]);items.add('lesson01:shadowing');profile.reviewItems=[...items];saveProfile()}render()}
    function next(){if(index<screens.length-1){index++;selected=null;render();scrollTo(0,0)}}
    function previous(){if(index===0){exitLesson();return}index--;render();scrollTo(0,0)}
    function finishLesson(){if(finished)return;finished=true;const score=Object.values(quizAnswers).filter(x=>x.correct).length,completed=new Set(profile.completedLessons||[]),first=!completed.has('lesson-01');completed.add('lesson-01');profile.completedLessons=[...completed];profile.lesson01Score=score;profile.lessonProgress={...(profile.lessonProgress||{}),'lesson-01':100};profile.weeklyProgress=Math.max(Number(profile.weeklyProgress)||0,1);profile.streak=Math.max(Number(profile.streak)||0,1);const reviews=new Set(profile.reviewItems||[]);reviews.add('lesson01:vowels');Object.entries(quizAnswers).filter(([,a])=>!a.correct).forEach(([q])=>reviews.add('lesson01:quiz:'+q));profile.reviewItems=[...reviews];earnedXp=first;if(first){profile.xp=(Number(profile.xp)||0)+50;profile.lesson01RewardClaimed=true}saveProfile()}
    function restartLesson(){index=0;finished=false;earnedXp=false;heardVowels.clear();heardConsonants.clear();built.clear();Object.keys(practiceAnswers).forEach(k=>delete practiceAnswers[k]);Object.keys(quizAnswers).forEach(k=>delete quizAnswers[k]);selfCheck=null;render();scrollTo(0,0)}
    function exitLesson(){saveProfile();location.href='nikigo-app.html?lang='+lang+'#dashboard'}
    $('#language').value=lang;saveProfile();render();
  </script>
