name: Generate lesson audio

on:
  push:
    paths:
      - audio/lesson-*/manifest.json
      - audio/k0-*/manifest.json
      - audio-catalog.js
      - scripts/generate-lesson-audio.mjs
      - scripts/validate-audio.mjs
  workflow_dispatch:
    inputs:
      lesson:
        description: Lesson audio to generate
        required: true
        default: lesson-02
        type: choice
        options:
          - lesson-01
          - lesson-02
          - lesson-03
          - lesson-04
          - k0-consonant-contrast

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'push'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Validate audio schema and lesson mappings
        run: node scripts/validate-audio.mjs --allow-missing-openai
      - name: Run complete test suite
        run: npm test

  generate:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Validate audio schema and lesson mappings before generation
        run: node scripts/validate-audio.mjs --allow-missing-openai
      - name: Generate Korean female audio
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-lesson-audio.mjs "audio/${{ inputs.lesson }}/manifest.json"
      - name: Validate generated files before publication
        run: npm test
      - name: Commit generated MP3 files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audio
          if git diff --cached --quiet; then
            echo "No audio changes"
          else
            git commit -m "Generate lesson Korean female audio"
            git push
          fi
