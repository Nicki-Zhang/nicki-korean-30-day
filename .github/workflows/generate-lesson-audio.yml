name: Generate lesson audio

on:
  push:
    paths:
      - audio/lesson-*/manifest.json
      - audio/k0-*/manifest.json
      - audio-catalog.js
      - scripts/generate-lesson-audio.mjs
      - scripts/validate-audio.mjs
  workflow_dispatch:
    inputs:
      lesson:
        description: Lesson audio to generate
        required: true
        default: lesson-02
        type: choice
        options:
          - lesson-00
          - lesson-01
          - lesson-02
          - lesson-03
          - lesson-04
          - k0-consonant-contrast

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'push'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Validate audio schema and lesson mappings
        run: node scripts/validate-audio.mjs --allow-missing-openai
      - name: Run complete test suite
        run: npm test

  generate:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: paid-audio-${{ inputs.lesson }}
      cancel-in-progress: false
    steps:
      - name: Require an explicit lesson selection
        env:
          SELECTED_LESSON: ${{ inputs.lesson }}
        run: |
          if [ -z "$SELECTED_LESSON" ]; then
            echo "::error::A lesson must be selected before paid audio generation."
            exit 1
          fi
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Validate audio schema and lesson mappings before generation
        run: node scripts/validate-audio.mjs --allow-missing-openai
      - name: Generate Korean female audio
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-lesson-audio.mjs "audio/${{ inputs.lesson }}/manifest.json"
      - name: Validate generated files before publication
        run: npm test
      - name: Upload generated lesson audio for review
        uses: actions/upload-artifact@v4
        with:
          name: nikigo-audio-${{ inputs.lesson }}-${{ github.run_number }}
          path: audio/${{ inputs.lesson }}/
          retention-days: 7
          if-no-files-found: error
