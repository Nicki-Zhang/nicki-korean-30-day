<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6657D9">
  <title>Nikigo · Lesson 11</title>
  <link rel="icon" href="assets/nikigo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/classic-focus-tokens.css">
  <link rel="stylesheet" href="assets/classic-focus-shell.css">
  <link rel="stylesheet" href="lesson-11-classic-focus.css">
</head>
<body class="classicFocusShell classicFocusScenario classicFocusLesson11">
  <a class="skipLink" id="skipLink" href="#lessonStage">Skip to lesson content</a>
  <header class="top" id="courseNavigation" aria-label="Course navigation">
    <button class="logo" id="homeLogo" type="button" translate="no">Nikigo</button>
    <span class="lessonName" id="lessonName"></span>
    <div class="topActions">
      <label class="languagePicker">
        <span class="srOnly" id="languageLabel">Interface language</span>
        <select id="language" aria-labelledby="languageLabel">
          <option value="zh">简体中文</option>
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
          <option value="ja">日本語</option>
        </select>
      </label>
      <button class="exitButton" id="homeButton" type="button" aria-label="Exit lesson">×</button>
    </div>
  </header>

  <div class="progressWrap">
    <div class="progressMeta"><span id="progressLabel"></span><b id="progressCount"></b></div>
    <div class="track" id="progressTrack" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><i></i></div>
  </div>

  <main class="stage">
    <section class="classicCard classicFocusCard" id="lessonStage" tabindex="-1"></section>
  </main>
  <dialog class="exitDialog" id="exitDialog" aria-labelledby="exitDialogTitle">
    <form method="dialog">
      <h2 id="exitDialogTitle"></h2>
      <p id="exitDialogCopy"></p>
      <div class="dialogActions">
        <button class="secondaryAction" id="exitCancelButton" value="cancel"></button>
        <button class="primaryAction" id="exitConfirmButton" value="confirm"></button>
      </div>
    </form>
  </dialog>
  <div class="srOnly" id="announcer" role="status" aria-live="polite"></div>
  <script src="app-state.js"></script>
  <script src="audio-catalog.js"></script>
  <script src="lesson-11.js"></script>
  <script src="assets/classic-focus-shell.js"></script>
  <script src="lesson-11-classic-focus.js"></script>
</body>
</html>
