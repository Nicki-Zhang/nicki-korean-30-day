<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6657D9">
  <title>Nikigo · Lesson 11</title>
  <link rel="icon" href="assets/nikigo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="lesson-clear-interactive.css">
  <link rel="stylesheet" href="lesson-purple-interactive.css">
  <link rel="stylesheet" href="lesson-11-mission.css">
</head>
<body class="missionLesson11">
  <a class="skipLink" href="#lessonStage">Skip to lesson content</a>
  <header class="lessonTop missionTop" id="missionTop" aria-label="Course navigation">
    <button class="iconButton" id="homeLogo" type="button" aria-label="Return to learning path">‹</button>
    <strong class="wordmark" translate="no">Nikigo</strong>
    <span class="lessonName srOnly" id="lessonName"></span>
    <div class="headerProgress" aria-label="Lesson progress">
      <b id="progressCount"></b>
      <div class="headerProgressTrack" id="progressTrack" role="progressbar" aria-valuemin="0" aria-valuemax="100">
        <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
      </div>
      <span class="srOnly" id="progressLabel"></span>
    </div>
    <label class="languagePicker">
      <span class="srOnly" id="languageLabel">Interface language</span>
      <select id="language" aria-label="Interface language">
        <option value="zh">简体中文</option>
        <option value="en">English</option>
        <option value="vi">Tiếng Việt</option>
        <option value="ja">日本語</option>
      </select>
    </label>
    <button class="iconButton" id="homeButton" type="button" aria-label="Exit lesson">×</button>
  </header>
  <main class="lessonCanvas">
    <section class="lessonStage" id="lessonStage" aria-live="polite"></section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <dialog class="exitDialog" id="exitDialog" aria-labelledby="exitDialogTitle">
    <form method="dialog">
      <h2 id="exitDialogTitle"></h2>
      <p id="exitDialogCopy"></p>
      <div class="dialogActions">
        <button class="secondaryAction" id="exitCancelButton" value="cancel"></button>
        <button class="primaryAction" id="exitConfirmButton" value="confirm"></button>
      </div>
    </form>
  </dialog>
  <script src="app-state.js"></script>
  <script src="audio-catalog.js"></script>
  <script src="lesson-11.js"></script>
  <script src="lesson-11-mission-shell.js"></script>
  <script src="lesson-clear-interactive.js"></script>
</body>
</html>
