<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6657D9">
  <title>Nikigo · Lesson 11</title>
  <link rel="icon" href="assets/nikigo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="lesson-clear-interactive.css">
  <link rel="stylesheet" href="lesson-purple-interactive.css">
</head>
<body>
  <header class="lessonTop">
    <button class="wordmark" id="homeLogo" type="button" aria-label="Return to courses"><b aria-hidden="true">✦</b> Nikigo</button>
    <span class="lessonName" id="lessonName"></span>
    <div class="topActions">
      <label class="languagePicker">
        <span class="srOnly">Interface language</span>
        <select id="language" aria-label="Interface language">
          <option value="zh">简体中文</option>
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
          <option value="ja">日本語</option>
        </select>
      </label>
      <button class="textHome" id="homeButton" type="button"></button>
    </div>
  </header>
  <section class="progressWrap" aria-label="Lesson progress">
    <div class="progressMeta"><span id="progressLabel"></span><b id="progressCount"></b></div>
    <div class="phaseTrack" id="progressTrack" role="progressbar" aria-valuemin="0" aria-valuemax="100">
      <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
    </div>
  </section>
  <main class="lessonCanvas">
    <section class="lessonStage" id="lessonStage" aria-live="polite"></section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app-state.js"></script>
  <script src="audio-catalog.js"></script>
  <script src="lesson-11.js"></script>
  <script src="lesson-clear-interactive.js"></script>
</body>
</html>
