<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6d4aff">
  <title>Nikigo · Review Center</title>
  <link rel="stylesheet" href="review.css">
  <link rel="stylesheet" href="player-privacy.css">
</head>
<body>
  <header class="top">
    <button class="logo" id="homeLogo" onclick="goHome()" aria-label="Return to learning home"><b>✦</b> Nikigo</button>
    <span class="sessionTitle" id="sessionTitle"></span>
    <label class="languagePicker"><span aria-hidden="true">🌐</span><select id="language" aria-label="Choose interface language" onchange="changeLanguage(this.value)"><option value="zh">简体中文</option><option value="en">English</option><option value="vi">Tiếng Việt</option><option value="ja">日本語</option></select></label>
    <button class="homeButton" id="homeButton" onclick="goHome()" aria-label="Return to learning home" title="Return to learning home"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.2 12 4l9 7.2v8.3a.5.5 0 0 1-.5.5H15v-6H9v6H3.5a.5.5 0 0 1-.5-.5z"/></svg></button>
  </header>
  <div class="progressWrap"><div class="progressMeta"><span id="progressLabel"></span><b id="progressCount"></b></div><div class="track" id="progressTrack" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-labelledby="progressLabel"><i id="progressBar"></i></div></div>
  <main class="stage"><article class="card" id="content"></article></main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app-state.js"></script>
  <script src="review-catalog.js"></script>
  <script>
    const SUPPORTED=['zh','en','vi','ja'];
    const COPY={
      zh:{title:'复习中心',progress:'复习进度',introTag:'SPACED REVIEW',introTitle:'该复习的内容，刚刚好',introLead:'Nikigo 会根据你的答题结果安排下一次出现时间。答错的内容会更快回来，掌握后间隔逐渐延长。',due:'现在到期',learning:'学习中',mastered:'已掌握',start:'开始复习',emptyTitle:'今天已经复习完成',emptyLead:'目前没有到期内容。继续学习课程，或等下一次复习时间到来。',returnHome:'返回学习主页',question:'复习题',listenPrompt:'听发音，选择对应内容。',buildPrompt:'选择正确组成的韩语音节。',recognizePrompt:'观察提示，选择正确答案。',meaningPrompt:'哪个韩语词表示“{meaning}”？',play:'播放韩语',correct:'答对了！',incorrect:'再练一次，正确答案是 {answer}。',nextDay:'下次将在 {days} 天后复习。',againSoon:'这项内容将在 10 分钟后再次出现。',continue:'继续',finish:'查看结果',completeTag:'REVIEW COMPLETE',completeTitle:'本轮复习完成！',completeLead:'你完成了 {total} 项复习，其中答对 {correct} 项。',xp:'本轮获得 +{xp} XP',schedule:'复习时间已经根据表现重新安排。',noContent:'部分旧复习内容暂时没有对应题目，已安全保留。',audioError:'当前无法播放韩语语音，请检查设备音量。'},
      en:{title:'Review center',progress:'Review progress',introTag:'SPACED REVIEW',introTitle:'The right review at the right time',introLead:'Nikigo schedules each item from your answers. Missed items return sooner; well-known items gradually move farther apart.',due:'Due now',learning:'Learning',mastered:'Mastered',start:'Start review',emptyTitle:'You are done for today',emptyLead:'Nothing is due right now. Continue a lesson or come back when the next review is ready.',returnHome:'Return to learning home',question:'Review',listenPrompt:'Listen and choose the matching item.',buildPrompt:'Choose the Korean syllable these letters make.',recognizePrompt:'Look at the cue and choose the correct answer.',meaningPrompt:'Which Korean word means “{meaning}”?',play:'Play Korean',correct:'That’s right!',incorrect:'Practice this again. The correct answer is {answer}.',nextDay:'Next review in {days} day(s).',againSoon:'This item will return in 10 minutes.',continue:'Continue',finish:'See results',completeTag:'REVIEW COMPLETE',completeTitle:'Review complete!',completeLead:'You reviewed {total} items and answered {correct} correctly.',xp:'You earned +{xp} XP',schedule:'The next review dates have been updated from your performance.',noContent:'Some legacy items do not have review questions yet. They are still safely saved.',audioError:'Korean audio is unavailable. Check your device volume.'},
      vi:{title:'Trung tâm ôn tập',progress:'Tiến độ ôn tập',introTag:'ÔN TẬP NGẮT QUÃNG',introTitle:'Ôn đúng nội dung, đúng thời điểm',introLead:'Nikigo lên lịch dựa trên câu trả lời. Nội dung sai sẽ quay lại sớm hơn; nội dung đã nhớ sẽ có khoảng cách dài dần.',due:'Đến hạn',learning:'Đang học',mastered:'Đã nhớ',start:'Bắt đầu ôn',emptyTitle:'Hôm nay đã ôn xong',emptyLead:'Hiện không có nội dung đến hạn. Hãy học tiếp hoặc quay lại khi lịch ôn mới xuất hiện.',returnHome:'Về trang học tập',question:'Câu ôn tập',listenPrompt:'Nghe và chọn nội dung tương ứng.',buildPrompt:'Chọn âm tiết được tạo bởi các chữ này.',recognizePrompt:'Quan sát gợi ý và chọn đáp án đúng.',meaningPrompt:'Từ tiếng Hàn nào có nghĩa là “{meaning}”?',play:'Phát tiếng Hàn',correct:'Chính xác!',incorrect:'Hãy luyện lại. Đáp án đúng là {answer}.',nextDay:'Lần ôn tiếp theo sau {days} ngày.',againSoon:'Nội dung này sẽ quay lại sau 10 phút.',continue:'Tiếp tục',finish:'Xem kết quả',completeTag:'HOÀN THÀNH ÔN TẬP',completeTitle:'Đã hoàn thành lượt ôn!',completeLead:'Bạn đã ôn {total} nội dung và trả lời đúng {correct}.',xp:'Bạn nhận được +{xp} XP',schedule:'Lịch ôn tiếp theo đã được cập nhật theo kết quả.',noContent:'Một số nội dung cũ chưa có câu hỏi ôn tập nhưng vẫn được lưu an toàn.',audioError:'Không thể phát tiếng Hàn. Hãy kiểm tra âm lượng thiết bị.'},
      ja:{title:'復習センター',progress:'復習進捗',introTag:'間隔反復',introTitle:'必要な内容を、ちょうどよい時に',introLead:'回答結果に合わせて次回の復習を設定します。間違えた内容は早く、覚えた内容は少しずつ間隔を延ばします。',due:'復習期限',learning:'学習中',mastered:'習得済み',start:'復習を開始',emptyTitle:'今日の復習は完了です',emptyLead:'現在、期限の来た内容はありません。レッスンを続けるか、次の復習時刻に戻ってきてください。',returnHome:'学習ホームへ戻る',question:'復習問題',listenPrompt:'音を聞いて対応するものを選んでください。',buildPrompt:'この文字からできる韓国語音節を選んでください。',recognizePrompt:'ヒントを見て正しい答えを選んでください。',meaningPrompt:'「{meaning}」を意味する韓国語はどれですか。',play:'韓国語を再生',correct:'正解です！',incorrect:'もう一度練習しましょう。正解は{answer}です。',nextDay:'次回は{days}日後に復習します。',againSoon:'この内容は10分後にもう一度出ます。',continue:'続ける',finish:'結果を見る',completeTag:'REVIEW COMPLETE',completeTitle:'復習完了！',completeLead:'{total}件を復習し、{correct}件正解しました。',xp:'今回 +{xp} XP を獲得',schedule:'結果に合わせて次回の復習日を更新しました。',noContent:'一部の旧復習項目には問題がまだありませんが、データは安全に保存されています。',audioError:'韓国語音声を再生できません。端末の音量を確認してください。'}
    };
    Object.assign(COPY.zh,{playerPlay:'播放音频',playerPlaying:'正在播放',playerReplay:'再次播放',playerLoading:'音频加载中',playerError:'音频暂时无法播放，请重试',playerAriaPlay:'播放本题韩语音频',playerAriaReplay:'再次播放本题韩语音频',testAudio:'当前为测试音频，正式发布前将完成韩语发音审核。',transcriptLabel:'音频原文',translationLabel:'含义'});
    Object.assign(COPY.en,{playerPlay:'Play audio',playerPlaying:'Playing',playerReplay:'Play again',playerLoading:'Loading audio',playerError:'Audio is temporarily unavailable. Try again.',playerAriaPlay:'Play this Korean audio question',playerAriaReplay:'Play this Korean audio question again',testAudio:'Test audio. Korean pronunciation will be reviewed before release.',transcriptLabel:'Audio transcript',translationLabel:'Meaning'});
    Object.assign(COPY.vi,{playerPlay:'Phát âm thanh',playerPlaying:'Đang phát',playerReplay:'Phát lại',playerLoading:'Đang tải âm thanh',playerError:'Tạm thời không thể phát âm thanh. Hãy thử lại.',playerAriaPlay:'Phát âm thanh tiếng Hàn của câu này',playerAriaReplay:'Phát lại âm thanh tiếng Hàn của câu này',testAudio:'Âm thanh thử nghiệm. Phát âm tiếng Hàn sẽ được duyệt trước khi phát hành.',transcriptLabel:'Nội dung âm thanh',translationLabel:'Nghĩa'});
    Object.assign(COPY.ja,{playerPlay:'音声を再生',playerPlaying:'再生中',playerReplay:'もう一度再生',playerLoading:'音声を読み込み中',playerError:'音声を一時的に再生できません。もう一度お試しください。',playerAriaPlay:'この問題の韓国語音声を再生',playerAriaReplay:'この問題の韓国語音声をもう一度再生',testAudio:'テスト音声です。公開前に韓国語発音の確認を完了します。',transcriptLabel:'音声の原文',translationLabel:'意味'});
    const state=window.NikigoState;
    const profile=state.get();
    let language=initialLanguage(),session=[],index=-1,answer=null,correctCount=0,earnedXp=0,currentAudio=null,playerState='initial';
    const $=selector=>document.querySelector(selector);
    function normalizeLanguage(value){const v=String(value||'').toLowerCase();if(v.startsWith('zh'))return'zh';if(v.startsWith('vi'))return'vi';if(v.startsWith('ja'))return'ja';return'en'}
    function initialLanguage(){const query=new URLSearchParams(location.search).get('lang');if(SUPPORTED.includes(query))return query;if(SUPPORTED.includes(profile.interfaceLanguage))return profile.interfaceLanguage;return normalizeLanguage(navigator.languages?.[0]||navigator.language)}
    function t(key){return COPY[language]?.[key]||COPY.en[key]||key}
    function saveLanguage(){profile.interfaceLanguage=language;profile.learningLanguage=language;state.save(profile,'review:language')}
    function changeLanguage(value){language=SUPPORTED.includes(value)?value:'en';saveLanguage();render()}
    function goHome(){location.href='nikigo-app.html?lang='+language+'#dashboard'}
    function dueItems(){return state.dueReviews({limit:20})}
    function supportedDueItems(){return dueItems().map(schedule=>({schedule,item:window.NIKIGO_REVIEW_CATALOG.get(schedule.id)})).filter(entry=>entry.item)}
    function instruction(item){if(item.kind==='listen')return t('listenPrompt');if(item.kind==='build')return t('buildPrompt');if(item.kind==='meaning')return t('meaningPrompt').replace('{meaning}',item.meaning?.[language]||item.meaning?.en||'');return t('recognizePrompt')}
    function neutralPlayerCopy(status){if(status==='loading')return{label:t('playerLoading'),aria:t('playerAriaPlay')};if(['playing','autoplay','fallback'].includes(status))return{label:t('playerPlaying'),aria:t('playerAriaReplay')};if(status==='error')return{label:t('playerError'),aria:t('playerAriaReplay')};if(['played','replay'].includes(status))return{label:t('playerReplay'),aria:t('playerAriaReplay')};return{label:t('playerPlay'),aria:t('playerAriaPlay')}}
    function playKorean(value){playerState='loading';render();if(!('speechSynthesis'in window)||typeof SpeechSynthesisUtterance==='undefined'){playerState='error';render();toast(t('playerError'));return}speechSynthesis.cancel();playerState='playing';render();const utterance=new SpeechSynthesisUtterance(value);utterance.lang='ko-KR';utterance.rate=Math.min(1.1,Math.max(.62,.78*(Number(profile.audioRate)||1)));utterance.onend=()=>{playerState='played';render()};utterance.onerror=event=>{if(!['canceled','interrupted'].includes(event.error)){playerState='error';render();toast(t('playerError'))}};currentAudio=utterance;speechSynthesis.speak(utterance)}
    function renderShell(){document.documentElement.lang=language==='zh'?'zh-CN':language;$('#language').value=language;$('#sessionTitle').textContent=t('title');$('#progressLabel').textContent=t('progress');const returnHomeLabel=t('returnHome');$('#homeButton').setAttribute('aria-label',returnHomeLabel);$('#homeButton').setAttribute('title',returnHomeLabel);$('#homeLogo').setAttribute('aria-label',returnHomeLabel);const total=session.length||supportedDueItems().length,position=index<0?0:Math.min(index+1,total),percent=total?Math.round(position/total*100):0;$('#progressCount').textContent=position+' / '+total;$('#progressBar').style.width=percent+'%';$('#progressTrack').setAttribute('aria-valuenow',String(percent))}
    function renderIntro(){const due=dueItems(),supported=supportedDueItems(),mastered=profile.reviewItems.filter(item=>item.status==='mastered').length,unknown=due.length-supported.length;if(!supported.length){$('#content').innerHTML=`<div class="empty"><span class="eyebrow">${t('title')}</span><h1>${t('emptyTitle')}</h1><p class="lead">${t('emptyLead')}</p>${unknown?`<div class="note">${t('noContent')}</div>`:''}<button class="primary wide" onclick="goHome()">${t('returnHome')} →</button></div>`;return}$('#content').innerHTML=`<span class="eyebrow">${t('introTag')}</span><h1>${t('introTitle')}</h1><p class="lead">${t('introLead')}</p><div class="reviewStats"><div class="reviewStat"><b>${supported.length}</b><span>${t('due')}</span></div><div class="reviewStat"><b>${profile.reviewItems.filter(item=>item.status==='active').length}</b><span>${t('learning')}</span></div><div class="reviewStat"><b>${mastered}</b><span>${t('mastered')}</span></div></div>${unknown?`<div class="note">${t('noContent')}</div>`:''}<button class="primary wide" data-action="start">${t('start')} →</button>`}
    function renderQuestion(){const entry=session[index],item=entry.item,schedule=state.get().reviewItems.find(review=>review.id===entry.schedule.id),feedback=answer?`<div class="feedback ${answer.correct?'good':'try'}">${answer.correct?t('correct'):t('incorrect').replace('{answer}',item.options[item.answer])}<br><small>${answer.correct?t('nextDay').replace('{days}',schedule.intervalDays):t('againSoon')}</small></div>`:'',player=neutralPlayerCopy(playerState),reveal=answer&&item.audio?`<div class="answerReveal"><b>${t('transcriptLabel')}：${item.audio}</b>${item.meaning?`<span>${t('translationLabel')}：${item.meaning[language]||item.meaning.en||''}</span>`:''}</div>`:'';$('#content').innerHTML=`<span class="eyebrow">${t('question')} · ${index+1}/${session.length}</span><h1>${instruction(item)}</h1>${item.cue&&(item.kind!=='listen'||answer)?`<div class="questionCue"><strong>${item.cue}</strong></div>`:''}${item.audio?`<div class="questionAudioPlayer" data-player-state="${playerState}"><button class="audioBtn" data-action="audio" aria-label="${player.aria}"><i>▶</i><span><b>${player.label}</b><small>0:02</small></span></button>${playerState==='error'?`<p class="playerError" role="status">${t('playerError')}</p>`:''}</div><p class="testAudioDisclosure">ⓘ ${t('testAudio')}</p>`:''}<div class="options">${item.options.map((option,choice)=>{let className='';if(answer){if(choice===item.answer)className='correct';else if(choice===answer.choice)className='wrong'}return`<button class="option ${className}" data-action="answer" data-choice="${choice}" ${answer?'disabled':''}><span>${String.fromCharCode(65+choice)}</span>${option}</button>`}).join('')}</div>${feedback}${reveal}<div class="foot"><button class="ghost" onclick="goHome()">← ${t('returnHome')}</button>${answer?`<button class="primary" data-action="next">${t(index===session.length-1?'finish':'continue')} →</button>`:''}</div>`}
    function renderComplete(){const total=session.length;$('#content').innerHTML=`<div class="complete"><div class="completeIcon">✓</div><span class="eyebrow">${t('completeTag')}</span><h1>${t('completeTitle')}</h1><p class="lead">${t('completeLead').replace('{total}',total).replace('{correct}',correctCount)}</p><div class="reviewStats"><div class="reviewStat"><b>${correctCount}/${total}</b><span>${t('correct')}</span></div><div class="reviewStat"><b>+${earnedXp}</b><span>XP</span></div><div class="reviewStat"><b>${state.dueReviews().length}</b><span>${t('due')}</span></div></div><div class="note">${t('schedule')}</div><button class="primary wide" onclick="goHome()">${t('returnHome')} →</button></div>`}
    function render(){renderShell();if(index<0)renderIntro();else if(index>=session.length)renderComplete();else renderQuestion()}
    function startSession(){session=supportedDueItems();index=session.length?0:-1;answer=null;playerState='initial';correctCount=0;earnedXp=0;render()}
    function chooseAnswer(choice){if(answer)return;const entry=session[index],correct=choice===entry.item.answer;answer={choice,correct};state.recordReview(entry.schedule.id,correct);if(correct){correctCount++;earnedXp+=5}render()}
    function next(){if(!answer)return;index++;answer=null;playerState='initial';render();scrollTo(0,0)}
    $('#content').addEventListener('click',event=>{const button=event.target.closest('[data-action]');if(!button)return;if(button.dataset.action==='start')startSession();if(button.dataset.action==='audio')playKorean(session[index].item.audio);if(button.dataset.action==='answer')chooseAnswer(Number(button.dataset.choice));if(button.dataset.action==='next')next()});
    function toast(message){const el=$('#toast');el.textContent=message;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1900)}
    saveLanguage();render();
  </script>
</body>
</html>
